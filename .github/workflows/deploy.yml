name: Build und Deploy auf GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Rechte, die der Deploy auf Pages braucht
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deploy gleichzeitig; laufende werden nicht abgebrochen
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Bauen
        run: npm run build

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Build-Ausgabe hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf Pages veroeffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
